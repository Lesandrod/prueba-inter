version: '3.8'
services:
  node-api:
    build: ./node-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - SECRET=${JWT_SECRET:-secret}
    restart: unless-stopped
    labels:
      - "traefik.http.services.node-api.loadbalancer.server.port=3000"

  go-api:
    build: ./go-api
    ports:
      - "8080:8080"
    environment:
      - NODE_STATS_URL=http://node-api:3000/stats
      - JWT_SECRET=${JWT_SECRET:-secret}
    depends_on:
      - node-api
    restart: unless-stopped
    labels:
      - "traefik.http.services.go-api.loadbalancer.server.port=8080"